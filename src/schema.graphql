type Cv {
    id: ID!
    name: String!
    Age: Int
    Job: String
    skills: [Skill!]
    User: User!
}

type Skill {
    id: ID!
    Designation: String!
    Cvs: [Cv!]
}

enum role {
    ADMIN
    USER
}

type User {
    id: ID!
    name: String!
    email: String!
    role: role!
    Cvs: [Cv!]
}


type Query {
    Cvs: [Cv!]!
    Skills: [Skill!]!
    Users: [User!]!
    Cv(id: ID!): Cv
    Skill(id: ID!): Skill
    User(id: ID!): User
}

type Mutation {
    createCv(input: CvInput!): Cv!
    updateCv(id: ID!, input: CvUpdateInput!): Cv!
    deleteCv(id: ID!): Boolean!
}

input CvInput {
    name: String!
    Age: Int
    Job: String
    UserId: ID!
    skillsId: [ID!]
}

input CvUpdateInput {
    name: String
    Age: Int
    Job: String
    UserId: ID
    skillsId: [ID!]
}